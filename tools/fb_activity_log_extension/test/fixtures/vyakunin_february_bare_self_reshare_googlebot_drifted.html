\u0440\u0438\u043c\u0435\u0440\u043d\u043e \u0442\u0430\u043a \u0420\u043e\u0441\u0441\u0438\u044f \u0432\u044b\u0433\u043b\u044f\u0434\u0438\u0442 \u0434\u043b\u044f \u043c\u0435\u043d\u044f \u043d\u0430 \u0444\u043e\u043d\u0435 \u043e\u0441\u0442\u0430\u043b\u044c\u043d\u043e\u0433\u043e \u043c\u0438\u0440\u0430.\n\n\u0415\u0441\u043b\u0438 \u041f\u0443\u0442\u0438\u043d \u043d\u0435 \u0441\u0434\u043e\u0445\u043d\u0435\u0442 (\u0438\u043b\u0438 \u0434\u0440\u0443\u0433\u0438\u043c \u0441\u043f\u043e\u0441\u043e\u0431\u043e\u043c \u043d\u0435 \u043f\u0440\u0435\u043a\u0440\u0430\u0442\u0438\u0442 \u0438\u0437\u0434\u0435\u0432\u0430\u0442\u044c\u0441\u044f \u043d\u0430\u0434 \u043c\u0438\u0440\u043e\u043c) \u0432 \u0431\u043b\u0438\u0436\u0430\u0439\u0448\u0438\u0435 \u043d\u0435\u0441\u043a\u043e\u043b\u044c\u043a\u043e \u043c\u0435\u0441\u044f\u0446\u0435\u0432, \u0442\u043e \u0434\u043b\u044f \u0420\u043e\u0441\u0441\u0438\u0438 \u043d\u0430\u0441\u0442\u0443\u043f\u044f\u0442 \u043d\u0435\u043e\u0431\u0440\u0430\u0442\u0438\u043c\u044b\u0435 \u043f\u043e\u0441\u043b\u0435\u0434\u0441\u0442\u0432\u0438\u044f. \u041c\u0438\u0440\u043e\u0432\u043e\u0435 \u043e\u0442\u043d\u043e\u0448\u0435\u043d\u0438\u0435 (\u0438 \u0441\u043e\u0442\u0440\u0443\u0434\u043d\u0438\u0447\u0435\u0441\u0442\u0432\u043e) \u0443\u0436\u0435 \u043d\u0435\u043b\u044c\u0437\u044f \u0431\u0443\u0434\u0435\u0442 \u0432\u0435\u0440\u043d\u0443\u0442\u044c \u0434\u0435\u0441\u044f\u0442\u0438\u043b\u0435\u0442\u0438\u044f\u043c\u0438, \u043d\u0438\u0449\u0435\u0442\u0430 \u0438 \u0443\u043f\u0430\u0434\u043e\u043a \u0441\u0442\u0430\u043d\u0443\u0442 \u043d\u0430\u043c\u043d\u043e\u0433\u043e \u0433\u043b\u0443\u0431\u0436\u0435.\n\n\u0415\u0441\u043b\u0438 \u041f\u0443\u0442\u0438\u043d \u043d\u0435 \u043a\u043e\u043d\u0447\u0438\u0442\u0441\u044f \u0432 \u0442\u0435\u0447\u0435\u043d\u0438\u0435 \u043d\u0435\u0441\u043a\u043e\u043b\u044c\u043a\u0438\u0445 \u043b\u0435\u0442, \u043f\u043e\u0442\u044f\u043d\u0435\u0442 \u0435\u0449\u0451 \u0434\u0435\u0441\u044f\u0442\u0438\u043b\u0435\u0442\u0438\u0435, \u0442\u043e \u0432\u044b\u0440\u0430\u0441\u0442\u0435\u0442 \u0446\u0435\u043b\u043e\u0435 \u043f\u043e\u043a\u043e\u043b\u0435\u043d\u0438\u0435, \u043a\u043e\u0442\u043e\u0440\u043e\u0435 \u0443\u0436\u0435 \u043d\u0435 \u0431\u0443\u0434\u0435\u0442 \u043e\u0431\u0440\u0430\u0437\u043e\u0432\u0430\u043d\u043d\u044b\u043c. \u041f\u043e\u0442\u043e\u043c\u0443 \u0447\u0442\u043e \u043d\u0435\u043a\u043e\u043c\u0443 \u0431\u0443\u0434\u0435\u0442 \u0438\u0445 \u043e\u0431\u0440\u0430\u0437\u043e\u0432\u044b\u0432\u0430\u0442\u044c. \u0418 \u043d\u0435 \u043d\u0430 \u0447\u0442\u043e. \u0418 \u0432\u0438\u0434\u0438\u043c\u043e \u043e\u043d\u0438 \u0431\u0443\u0434\u0443\u0442 \u043f\u043e\u043a\u043e\u043b\u0435\u043d\u0438\u0435\u043c \u0432\u043e\u0439\u043d\u044b, \u043f\u043e\u0442\u043e\u043c\u0443 \u0447\u0442\u043e \u041f\u0443\u0442\u0438\u043d \u2014 \u044d\u0442\u043e \u0432\u043e\u0439\u043d\u0430.\n\n\u0422\u0430\u043a\u0438\u043c \u043e\u0431\u0440\u0430\u0437\u043e\u043c \u0420\u043e\u0441\u0441\u0438\u0438 \u043d\u0435 \u043e\u0441\u0442\u0430\u043d\u0435\u0442\u0441\u044f, \u0432\u043c\u0435\u0441\u0442\u043e \u043d\u0435\u0435 \u043f\u043e\u043b\u0443\u0447\u0438\u0442\u0441\u044f \u043a\u0430\u043a\u0430\u044f-\u0442\u043e \u0434\u0440\u0443\u0433\u0430\u044f \u0441\u0442\u0440\u0430\u043d\u0430, \u0432\u043e\u0438\u043d\u0441\u0442\u0432\u0443\u044e\u0449\u0430\u044f, \u043d\u0435\u043e\u0431\u0440\u0430\u0437\u043e\u0432\u0430\u043d\u043d\u0430\u044f, \u0435\u0434\u0438\u043d\u0430\u044f \u0432 \u043d\u0430\u0446\u0438\u043e\u043d\u0430\u043b\u0438\u0437\u043c\u0435.\n\n\u0415\u0441\u0442\u044c \u041f\u0443\u0442\u0438\u043d \u2014 \u043d\u0435\u0442 \u0420\u043e\u0441\u0441\u0438\u0438. \u041d\u0435\u0442 \u041f\u0443\u0442\u0438\u043d\u0430 \u2014 \u0435\u0441\u0442\u044c \u0420\u043e\u0441\u0441\u0438\u044f. \u0421\u0435\u0439\u
