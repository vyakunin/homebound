# Scope-level invariants. test_extraction.py asserts these per (year, month)
# scope across all posts harvested in that scope — not per individual
# golden entry. Use for "must not happen" properties that span the whole
# harvest output.
scope_invariants:

  # ─── R1: distinct posts must have distinct media (SPA-pollution guard) ──
  # Observed 2026-05-19 (v2.8.22, golden-set test b7m87brk7): every
  # enrichment in a multi-post scope captured the SAME feedImage src
  # (701559568_10166638455437228_n.jpg, alt='моЖЕМ ГЛАСНОСТЬ', from
  # Kolyandr's "Идея не моя, нет" post) regardless of which fetchUrl the
  # SW navigated to. `chrome.tabs.get(tabId).url` reported the correct
  # final URL, but the rendered DOM kept showing the SAME post — FB's
  # SPA/service-worker is bleeding state between ephemeral tabs in the
  # shared export window.
  #
  # This invariant catches the regression: if N posts in a scope each
  # claim media, their media-set sha256s must NOT all be identical.
  # Two posts with literally the same content (e.g. two reshares of the
  # same chain) is acceptable; ALL posts sharing one hash is not.
  - id: distinct_posts_distinct_media
    rule: media_hashes_not_all_identical
    min_posts_with_media: 3   # only fire when there's enough sample size
