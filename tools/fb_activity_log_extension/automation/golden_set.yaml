# Golden set for the FB Activity Log extension.
#
# Each entry describes a real post / comment the user has on Facebook,
# anchored by a stable identifier (pfbid permalink), with the EXACT
# field values + media we expect the extension to produce. The
# integration test (test_extraction.py) drives a month-scoped harvest
# for the entry's scope and asserts the extracted record matches.
#
# Source of truth for expectations: user screenshots of the actual rendered
# post on facebook.com. When the extraction disagrees with the screenshot,
# fix the extension — not the golden file.
#
# Media verification: each entry pins exact sha256 hashes of expected
# media files. When `media_sha256` is empty/contains "TBD", the test
# runs in `--with-media` mode, computes hashes from the downloaded
# files, prints them, and reports the entry as PENDING — paste the
# hashes back in after visually verifying the correct image was saved.

posts:

  # ─── 1: Simple reshare with brief commentary, video media (May 6 2026) ──
  # Vladimir's reshare of a Maksim Kournikov video about Zakharov's book
  # presentation in Prague. Commentary: "Nuff said". Embedded content: reel.
  - id: nuff_said_reel_reshare
    scope: {year: 2026, month: 5}
    # Full pfbid for Vladimir's reshare of the reel (from 2026-05 harvest).
    # The harvester also emits a row for the original reel URL — the test
    # only suffix-matches, so anchoring on Vladimir's pfbid is the precise
    # form (and avoids false-matching FB's own canonical reel post).
    post_key_suffix: pfbid0pAHLYJnbSkivNmN8HTNiqHJg8MjcBJiZm3eX2Y4nupzhPKJZ74vYfyVLpzowbzosl
    expect:
      is_reshare: true
      # Exact commentary — no "Public6:23 AM" / "View" Activity Log row
      # artifacts allowed in the captured value.
      reshare_commentary_exact: "Nuff said"
      # The reshared content is a reel. The extension must populate
      # `reshared_from_url` with the original reel URL.
      reshared_from_url_contains: "/reel/954305617193406"
      timestamp_rawText: "May 6, 2026"
      # Reel cover image (the only media we can extract through the public-bot
      # view of FB; the underlying video bytes are gated). Captured 2026-05-20.
      media_count_exact: 1
      media_sha256:
        - 4a2d0e1a77be8a4a9dc21a0240c490289ba8431a5f91b6c77e6177c7335051eb

  # ─── 2: Reshare with multiline commentary, single image (May 6 2026) ────
  # Vladimir's reshare of Slantchev's "Americans are coming" chart post.
  - id: sravnenie_chart_reshare
    scope: {year: 2026, month: 5}
    post_key_suffix: pfbid02QSLqgSLoeLVXzG9UFdr4Tth3KpGFrzpWAE2vmiBprjs
    expect:
      is_reshare: true
      # Multiline commentary; second line "А что же случилось?" must be
      # preserved. No Public / View / time artifacts.
      reshare_commentary_exact: "Сравнение, конечно, некорректное, но...\nА что же случилось?"
      reshared_from_url_contains: "/slantchev/posts/"
      timestamp_rawText: "May 6, 2026"
      # The chart image (slantchev's primary image, served via og:image to
      # the public-bot fetch of Vladimir's reshare). Captured 2026-05-20.
      media_count_exact: 1
      media_sha256:
        - 1733c789d6814fec1f90b3c86614d5333a82f91d5edc5a53124673e28973ad41

  # ─── 3: G+/Trump memorial reshare (Apr 7 2026) ─────────────────────────
  # The canonical chess-pic-on-Apr7 case that drove v2.8.13–.17 fixes.
  # Vladimir's commentary: "Лучше соцсети, чем гугл+ уже не будет. Хотя...
  # Stay tuned!". Embedded "G+ Jun 2, 2017" share contains a Trump nuclear-
  # weapons tweet screenshot + Russian commentary "Когда он сам так
  # ставит вопрос, меня это начинает беспокоить".
  #
  # Known previous failure mode: 20+ unrelated images attributed to this
  # post including a chess-club photo. Goal: 1 correct image, no others.
  - id: april7_gplus_memorial
    scope: {year: 2026, month: 4}
    post_key_suffix: pfbid0BnzpBWZFEhyh8F1dVCTNMWnFq4EAZFFbwEnaMgmRw3QQGRfpBsqoe5fd2pmRAWS5l
    expect:
      is_reshare: true
      # This is a Google+ memorial-style reshare. The "reshared_from_url"
      # likely points at the G+ archive URL or a special FB representation.
      # We accept either reshare_commentary or text containing the user's
      # quote (different harvest paths may put it in different fields
      # historically).
      commentary_or_reshare_commentary_starts_with: "Лучше соцсети, чем гугл+"
      commentary_or_reshare_commentary_contains: ["Stay tuned"]
      timestamp_rawText: "April 7, 2026"
      # Exactly ONE image (the Trump tweet screenshot). Hash filled after
      # first successful run + visual verification.
      media_count_exact: 1
      media_sha256: [TBD]

  # ─── 4: Self-reshare without commentary (Feb 24 2026) ───────────────────
  # Vladimir reshares his OWN March 2, 2022 long-text post about "Что
  # такое Россия". No commentary at the top — bare reshare. Extension
  # MUST NOT invent commentary from the embedded reshared post's text.
  #
  # post_key_suffix to be filled after the first 2026-02 harvest run
  # surfaces the pfbid.
  - id: february_self_reshare_no_commentary
    scope: {year: 2026, month: 2}
    # Vladimir's reshare permalink for the Feb 24 2026 self-reshare of his
    # own March 2 2022 long-text post about "Что такое Россия". Captured
    # in the 2026-02 harvest 2026-05-20.
    post_key_suffix: pfbid02oick7TXPr6mNKXfigEjfu3HKprGdaf7Z2UCgwEa6hKudDY1fmpBN7PUCkZiF3wGml
    expect:
      is_reshare: true
      reshare_commentary_exact: ""
      # Reshared content is text-only (the original March 2022 post). NO
      # media should be attributed.
      media_count_exact: 0
      media_sha256: []

  # ─── 5: OTHER's-content reshare WITH commentary (Nov 2024) ─────────────
  # Vladimir reshares Mike Tamm's Nov 5 2024 post about the US election
  # and adds a long Russian commentary about voting Trump in California
  # despite supporting Harris. Inspecting the saved reshare row dump
  # (reshare_row_00_…mike_tamm_9…html) confirmed the captured text IS
  # Vladimir's commentary (NOT Mike's body leaking through, as I
  # initially assumed). This entry pins regression on the trailer-strip
  # fix (v2.8.19) — captured commentary must not contain "Public<HH:MM>"
  # Activity-Log row artifact.
  #
  # Caveat: captured postKey currently equals Mike's pfbid (the link the
  # activity-log row anchors to), NOT Vladimir's reshare pfbid. That's a
  # separate identity bug; anchored here by Mike's pfbid until fixed.
  - id: mike_tamm_other_reshare_with_long_commentary
    scope: {year: 2024, month: 11}
    post_key_suffix: pfbid02irxsrn4dagXMBuJxj2cbBqntAugxMwTBs8KGTsPb
    expect:
      is_reshare: true
      reshare_commentary_starts_with: "это один из десятка достаточных аргументов не голосовать за Трампа"
      # Regression for the Public<HH:MM> trailer bug (fixed v2.8.19):
      # the captured commentary must end at the user's last sentence,
      # NOT include "Public9:13 PM" or similar.
      reshare_commentary_must_not_contain: ["Public", "View", "AM", "PM"]
      reshared_from_url_contains: "/mike.tamm.9/posts/"
      timestamp_rawText: "November 5, 2024"
      # Mike's original post has one image but we currently cannot reach
      # it. KNOWN LIMITATION as of v2.8.25:
      #   - Activity Log GraphQL responses carry no post media (Layer A
      #     cache is structurally empty for this surface).
      #   - Public-bot fetch (Layer B, Googlebot UA) of Mike's permalink
      #     returns the SPA shell with no og:image — Mike's privacy
      #     scope is presumably narrower than Public, so FB serves
      #     Googlebot a stripped page (title only, no media).
      #   - Logged-in fetch returns the SPA shell which only ships
      #     hydration scaffolding; media URLs arrive via async GraphQL
      #     after page load.
      # The eventual fix is foreground-tab navigation (load URL in the
      # user's main tab, intercept GraphQL via page_hook). Until then,
      # pin media_count_exact: 0 + a non-empty hash sentinel that
      # forces a re-pin once the fix lands.
      media_count_exact: 0
      media_sha256: []

# Comments goldens. comments-own-posts-only is OFF by default in the
# wizard (training-data mode → harvest comments on others' posts too).
# Add entries once a stable comment exists with known wording.
comments: []

# Scope-level invariants. test_extraction.py asserts these per (year, month)
# scope across all posts harvested in that scope — not per individual
# golden entry. Use for "must not happen" properties that span the whole
# harvest output.
scope_invariants:

  # ─── R1: distinct posts must have distinct media (SPA-pollution guard) ──
  # Observed 2026-05-19 (v2.8.22, golden-set test b7m87brk7): every
  # enrichment in a multi-post scope captured the SAME feedImage src
  # (701559568_10166638455437228_n.jpg, alt='моЖЕМ ГЛАСНОСТЬ', from
  # Kolyandr's "Идея не моя, нет" post) regardless of which fetchUrl the
  # SW navigated to. `chrome.tabs.get(tabId).url` reported the correct
  # final URL, but the rendered DOM kept showing the SAME post — FB's
  # SPA/service-worker is bleeding state between ephemeral tabs in the
  # shared export window.
  #
  # This invariant catches the regression: if N posts in a scope each
  # claim media, their media-set sha256s must NOT all be identical.
  # Two posts with literally the same content (e.g. two reshares of the
  # same chain) is acceptable; ALL posts sharing one hash is not.
  - id: distinct_posts_distinct_media
    rule: media_hashes_not_all_identical
    min_posts_with_media: 3   # only fire when there's enough sample size
